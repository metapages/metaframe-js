name: Publish Python Package

on:
  push:
    tags:
      - "python-v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "python/[dev]"
      - run: cd python && pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/metaframe-widget/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatch
      - run: cd python && hatch build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
